name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      # Configure Next.js for static export with GitHub Pages base path
      - name: Configure static export
        run: |
          cat > next.config.ts << 'NEXTCONFIG'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {
            output: "export",
            basePath: "/proxy-analysis-guide",
            images: {
              unoptimized: true,
            },
            typescript: {
              ignoreBuildErrors: true,
            },
            reactStrictMode: false,
          };

          export default nextConfig;
          NEXTCONFIG

      # Remove API route files (not supported in static export)
      - name: Remove API routes for static build
        run: |
          rm -rf src/app/api

      - name: Build static site
        run: bun run build
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Add 404 page for SPA routing
        run: |
          cp out/index.html out/404.html 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
